<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Happy Sudoku Logo</title>
  <desc id="desc">Cute cartoon sudoku logo with smiling sun, clouds, and colorful board.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdeeff"/>
      <stop offset="55%" stop-color="#dff8e7"/>
      <stop offset="100%" stop-color="#8acb8a" style="&#10;"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5ec9f"/>
      <stop offset="100%" stop-color="#8bd074"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f9f3e8"/>
    </linearGradient>
    <linearGradient id="titleBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fd8f3"/>
      <stop offset="100%" stop-color="#6bc3e5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#5f7a8f" flood-opacity="0.25"/>
    </filter>
    <clipPath id="frameClip">
      <rect x="0" y="0" width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#sky)"/>

    <ellipse cx="156" cy="458" rx="220" ry="52" fill="url(#hill)" opacity="0.9"/>
    <ellipse cx="392" cy="462" rx="180" ry="42" fill="url(#hill)" opacity="0.88"/>

    <g opacity="0.9">
      <ellipse cx="92" cy="124" rx="34" ry="20" fill="#ffffff"/>
      <ellipse cx="122" cy="120" rx="26" ry="17" fill="#ffffff"/>
      <ellipse cx="412" cy="138" rx="38" ry="22" fill="#ffffff"/>
      <ellipse cx="444" cy="132" rx="28" ry="18" fill="#ffffff"/>
    </g>

    <g transform="translate(70 52)" filter="url(#softShadow)">
      <rect x="0" y="0" width="372" height="72" rx="36" fill="url(#titleBg)" stroke="#4d8ca9" stroke-width="4"/>
      <rect x="12" y="8" width="344" height="22" rx="11" fill="#ffffff" opacity="0.45"/>
      <text x="186" y="48" text-anchor="middle" font-family="Nunito, 'Noto Sans SC', sans-serif" font-size="34" font-weight="900" fill="#fffdf7" letter-spacing="2" style="paint-order: stroke; stroke: #497088; stroke-width: 4px;">HAPPY SUDOKU</text>
    </g>

    <g transform="translate(24 68)">
      <circle cx="42" cy="42" r="26" fill="#ffd979" stroke="#d99f4f" stroke-width="4"/>
      <circle cx="33" cy="38" r="3.5" fill="#8f6844"/>
      <circle cx="51" cy="38" r="3.5" fill="#8f6844"/>
      <path d="M30 49 Q42 59 54 49" fill="none" stroke="#8f6844" stroke-width="4" stroke-linecap="round"/>
      <g stroke="#f0b95c" stroke-width="4" stroke-linecap="round">
        <line x1="42" y1="8" x2="42" y2="0"/>
        <line x1="68" y1="16" x2="75" y2="10"/>
        <line x1="74" y1="42" x2="84" y2="42"/>
        <line x1="68" y1="68" x2="75" y2="74"/>
        <line x1="16" y1="68" x2="9" y2="74"/>
        <line x1="10" y1="42" x2="0" y2="42"/>
        <line x1="16" y1="16" x2="9" y2="10"/>
      </g>
    </g>

    <g transform="translate(114 152)" filter="url(#softShadow)">
      <rect x="0" y="0" width="284" height="284" rx="42" fill="url(#board)" stroke="#d4c39f" stroke-width="8"/>
      <rect x="30" y="30" width="224" height="224" rx="18" fill="#fffdf8" stroke="#cfb27c" stroke-width="6"/>

      <g transform="translate(30 30)">
        <g stroke="#8cb0c6" stroke-width="2.5">
          <line x1="74.66" y1="0" x2="74.66" y2="224"/>
          <line x1="149.33" y1="0" x2="149.33" y2="224"/>
          <line x1="0" y1="74.66" x2="224" y2="74.66"/>
          <line x1="0" y1="149.33" x2="224" y2="149.33"/>
        </g>
        <g font-family="Nunito, 'Noto Sans SC', sans-serif" font-weight="800" font-size="34" fill="#657988">
          <text x="18" y="44">5</text>
          <text x="172" y="44">2</text>
          <text x="98" y="118">9</text>
          <text x="18" y="194">7</text>
          <text x="172" y="194">3</text>
        </g>
      </g>
    </g>

    <g transform="translate(54 394)">
      <circle cx="0" cy="0" r="24" fill="#8dd7e9" stroke="#5caec4" stroke-width="4"/>
      <circle cx="6" cy="-4" r="7" fill="#fff"/>
      <circle cx="7" cy="-4" r="3.2" fill="#344d5e"/>
    </g>

    <g transform="translate(438 406)">
      <circle cx="-12" cy="-14" r="14" fill="#ffd86a" stroke="#d89d3f" stroke-width="3"/>
      <circle cx="-16" cy="-16" r="1.8" fill="#4b3f32"/>
      <circle cx="-8" cy="-16" r="1.8" fill="#4b3f32"/>
      <path d="M-17 -9 Q-12 -5 -7 -9" fill="none" stroke="#4b3f32" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
</svg>